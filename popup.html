<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Smart Video Controls</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      color: #222;
      background: #f5f5f5;
      min-width: 340px;
      max-width: 380px;
    }

    .header {
      background: #3a5fa0;
      color: #fff;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .section {
      background: #fff;
      margin: 10px;
      border-radius: 6px;
      border: 1px solid #e0e0e0;
      overflow: hidden;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #666;
      padding: 8px 12px 6px;
      border-bottom: 1px solid #f0f0f0;
      background: #fafafa;
    }

    /* ── Status ── */
    #status {
      padding: 10px 12px;
      font-size: 13px;
      color: #555;
    }
    #status.has-video { color: #1a6e2e; background: #edf7f0; }
    #status.no-video  { color: #888; }

    /* ── Quick controls ── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 10px 8px;
    }

    .ctrl-btn {
      background: none;
      border: 1px solid #ddd;
      border-radius: 6px;
      cursor: pointer;
      padding: 6px 10px;
      font-size: 18px;
      line-height: 1;
      color: #3a5fa0;
      transition: background 0.15s, border-color 0.15s;
      min-width: 40px;
      text-align: center;
    }
    .ctrl-btn:hover { background: #eef2fb; border-color: #3a5fa0; }
    .ctrl-btn:active { background: #d5e0f5; }
    .ctrl-btn span.label {
      display: block;
      font-size: 9px;
      color: #888;
      margin-top: 2px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    /* ── Shortcuts table ── */
    table {
      width: 100%;
      border-collapse: collapse;
    }
    td {
      padding: 7px 12px;
      border-bottom: 1px solid #f3f3f3;
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }

    .action-name {
      color: #444;
      font-size: 12px;
      width: 50%;
    }

    .key-badge {
      display: inline-block;
      background: #e8edf5;
      border: 1px solid #c5cfe0;
      border-radius: 4px;
      padding: 2px 7px;
      font-family: monospace;
      font-size: 12px;
      color: #3a5fa0;
      min-width: 48px;
      text-align: center;
    }
    .key-badge.recording {
      background: #fff3cd;
      border-color: #e0a800;
      color: #856404;
      animation: blink 0.8s infinite;
    }

    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

    .edit-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #3a5fa0;
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 3px;
      text-decoration: underline;
      opacity: 0.7;
    }
    .edit-btn:hover { opacity: 1; }

    .td-right {
      text-align: right;
      white-space: nowrap;
    }

    /* ── Buttons row ── */
    .btn-row {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
    }

    .btn {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 5px;
      background: #fff;
      cursor: pointer;
      padding: 6px 8px;
      font-size: 12px;
      color: #444;
      transition: background 0.15s;
    }
    .btn:hover { background: #f0f0f0; }
    .btn.primary { background: #3a5fa0; color: #fff; border-color: #3a5fa0; }
    .btn.primary:hover { background: #2e4f8a; }
    .btn.danger { color: #c0392b; }
    .btn.danger:hover { background: #fdf0ef; }
  </style>
</head>
<body>

  <div class="header">Smart Video Controls</div>

  <!-- Status -->
  <div class="section">
    <div class="section-title">Video Status</div>
    <div id="status" class="no-video">Checking…</div>
  </div>

  <!-- Quick Controls -->
  <div class="section">
    <div class="section-title">Quick Controls</div>
    <div class="controls">
      <button class="ctrl-btn" data-action="speedDown" title="Speed down">
        ⏪<span class="label">Slower</span>
      </button>
      <button class="ctrl-btn" data-action="skipBack" title="Skip back 10s">
        ↩<span class="label">-10s</span>
      </button>
      <button class="ctrl-btn" data-action="playPause" title="Play / Pause" id="playPauseBtn">
        ▶<span class="label">Play</span>
      </button>
      <button class="ctrl-btn" data-action="skipForward" title="Skip forward 10s">
        ↪<span class="label">+10s</span>
      </button>
      <button class="ctrl-btn" data-action="speedUp" title="Speed up">
        ⏩<span class="label">Faster</span>
      </button>
    </div>
  </div>

  <!-- Shortcuts -->
  <div class="section">
    <div class="section-title">Keyboard Shortcuts — click Edit to change</div>
    <table id="shortcuts-table">
      <!-- rows injected by popup.js -->
    </table>
    <div class="btn-row">
      <button class="btn danger" id="reset-btn">Reset to Defaults</button>
    </div>
  </div>

  <!-- Logger -->
  <div class="section">
    <div class="section-title">Debug Logger</div>
    <div class="btn-row">
      <button class="btn primary" id="toggle-logger-btn">Show Logger</button>
      <button class="btn" id="clear-logs-btn">Clear Logs</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
